        // ── BUILD ORDER VIEW ──────────────────────────────────────────
        return h("div", { className: "page" },
          // Back to history
          h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 8 } },
            h("button", { className: "btn-ghost", style: { padding: "4px 0", fontSize: 13 }, onClick: () => { localStorage.removeItem(DRAFT_KEY); setPhase("history"); setBasket([]); setErr(""); } }, "← Order History"),
          ),
          // Stale draft warning (shown when draft is older than 24h)
          draftAge !== null && draftAge >= DRAFT_MAX_H && h("div", { className: "so-draft-warning" },
            h("div", { className: "so-draft-warning-text" },
              `⚠ Draft restored from ${draftAge >= 48
                ? `${Math.floor(draftAge / 24)} days ago`
                : `${draftAge}h ago`}. Double-check quantities before submitting.`
            ),
            h("button", {
              className: "so-draft-discard",
              onClick: () => {
                localStorage.removeItem(DRAFT_KEY);
                setBasket([]); setShipDate(""); setSoRef(""); setSoCustomNum("");
                setUseCustomNum(false); setDraftAge(null);
              }
            }, "Discard"),
          ),
          // Sticky header: compact meta fields + search bar
          h("div", { className: "so-sticky-header" },
            h("div", { className: "card" },
              h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 } },
                h("div", { style: { display: "flex", alignItems: "center", gap: 0 } },
                  h("span", { className: "card-title", style: { marginBottom: 0 } }, "New Order"),
                  basket.length > 0 && h("span", { className: `so-autosave-badge${draftSaved ? " saved" : ""}` },
                    h("span", { className: "so-autosave-dot" }),
                    draftSaved ? "Draft saved" : `${basket.length} item${basket.length !== 1 ? "s" : ""}`,
                  ),
                ),
                h("span", { style: { fontSize: 11, color: "var(--g2)" } }, customer.customer_name),
              ),
              // Compact meta row: date | ref | custom SO toggle
              h("div", { className: "so-meta-row" },
                h("div", null,
                  h("label", { style: { fontSize: 11 } }, "Ship Date"),
                  h("input", { type: "date", value: shipDate, min: today(), onChange: e => setShipDate(e.target.value) }),
                ),
                h("div", null,
                  h("label", { style: { fontSize: 11 } }, "Reference"),
                  h("input", { type: "text", placeholder: "Auto-generated if blank", value: soRef, onChange: e => setSoRef(e.target.value) }),
                ),
                h("div", { style: { display: "flex", flexDirection: "column", gap: 4 } },
                  h("label", { style: { display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontSize: 11, color: "var(--g1)", whiteSpace: "nowrap" } },
                    h("input", { type: "checkbox", checked: useCustomNum, onChange: e => setUseCustomNum(e.target.checked), style: { accentColor: "var(--gold)" } }),
                    "Custom SO#"
                  ),
                  useCustomNum && h("input", { type: "text", placeholder: "e.g. SO-00042", value: soCustomNum, onChange: e => setSoCustomNum(e.target.value), style: { fontSize: 12, padding: "6px 8px" } }),
                ),
              ),
              // Search bar
              h("div", { style: { marginTop: 10 } },
                h("div", { className: "search-wrap", style: { marginBottom: 0 } },
                  h("span", { className: "search-icon" }, "⌕"),
                  h("input", { type: "text", placeholder: "SKU or item name...", value: query,
                    onChange: e => { setQuery(e.target.value); setErr(""); },
                    autoFocus: true }),
                ),
                results.length > 0 && h("div", { className: "so-search-results" },
                  results.map(it => {
                    const s = Cache.stk(it.sku);
                    const inBasket = !!basket.find(b => b.sku === it.sku);
                    const rate = priceFor(it.item_id || it.sku, it.sku);
                    return h("div", { key: it.sku, className: "so-result-row",
                      onClick: () => !inBasket && addItem(it),
                      style: { opacity: inBasket ? 0.45 : 1, cursor: inBasket ? "default" : "pointer" } },
                      h("div", { className: "so-res-left" },
                        h("div", { className: "so-res-name" }, it.name),
                        h("div", { className: "so-res-sku" }, it.sku,
                          rate > 0 && h("span", { style: { marginLeft: 8, color: "var(--gold)", fontSize: 11 } }, `KES ${rate.toLocaleString()}`),
                          rate === 0 && h("span", { style: { marginLeft: 8, color: "var(--red)", fontSize: 11 } }, "No price set"),
                        ),
                      ),
                      h("div", { className: "so-res-right" },
                        h("span", { className: `badge abc-${it.abc_class||"C"}` }, it.abc_class||"C"),
                        s !== null && h("span", { className: `badge ${s.combined===0?"stk-out":s.combined<3?"stk-low":"stk-ok"}` }, s.combined===0?"Out":s.combined),
                        inBasket && h("span", { className: "chip chip-gold" }, "Added"),
                      ),
                    );
                  }),
                ),
              ),
            ),
          ),
          // Basket — newest item on top (reversed), scrollable
          basket.length > 0 && h("div", { className: "card", style: { marginTop: 8 } },
            h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 } },
              h("div", { className: "card-title", style: { marginBottom: 0 } }, `Basket (${basket.length} item${basket.length!==1?"s":""})`),
              orderTotal > 0 && h("span", { style: { fontSize: 15, fontWeight: 700, color: "var(--gold)" } }, `KES ${orderTotal.toLocaleString()}`),
            ),
            h("div", { className: "so-basket-scroll" },
              [...sortedBasket].reverse().map(b => {
                const lineVal = b.rate * b.qty;
                const freeStock = b.stk !== null
                  ? (b.stk.free_stock !== undefined ? b.stk.free_stock : b.stk.combined ?? b.stk)
                  : null;
                const rawStk = typeof b.stk === "object" && b.stk !== null ? b.stk.combined : b.stk;
                return h("div", { key: b.sku, className: "so-basket-card" },
                  // Left: name + meta
                  h("div", { className: "so-basket-card-info" },
                    h("div", { className: "so-basket-card-name" }, b.name),
                    h("div", { className: "so-basket-card-meta" },
                      h("span", { className: "so-basket-card-sku" }, b.sku),
                      h("span", { className: `badge abc-${b.abc}` }, b.abc),
                      rawStk !== null && rawStk !== undefined && h("span", {
                        className: `badge ${rawStk === 0 ? "stk-out" : rawStk < 3 ? "stk-low" : "stk-ok"}`
                      }, rawStk === 0 ? "Out of stock" : `Free: ${freeStock ?? rawStk}`),
                      b.rate === 0 && h("span", { style: { color: "var(--red)", fontSize: 11 } }, "No price"),
                    ),
                  ),
                  // Middle: line value
                  h("div", null,
                    h("div", { className: "so-basket-card-line" },
                      lineVal > 0 ? `KES ${lineVal.toLocaleString()}` : "—"
                    ),
                    h("div", { className: "so-basket-card-line-sub" },
                      b.rate > 0 ? `@ ${b.rate.toLocaleString()}` : ""
                    ),
                  ),
                  // Right: qty + remove
                  h("div", { className: "so-basket-qty-wrap" },
                    h("span", { className: "so-basket-qty-label" }, "Qty"),
                    h("input", { type: "number", min: "1", className: "so-basket-qty",
                      value: qtyDraft[b.sku] !== undefined ? qtyDraft[b.sku] : b.qty,
                      onChange: e => setQty(b.sku, e.target.value),
                      onBlur: () => commitQty(b.sku) }),
                    h("button", { className: "so-basket-remove", onClick: () => removeItem(b.sku),
                      style: { marginTop: 2 } }, "×"),
                  ),
                );
              }),
            ),
            h("div", { className: "so-stamp" }, stamp),
          ),
          err && h("div", { className: "err-box", style: { marginBottom: 10 } }, err),
          phase === "submitting" && h(Spin, { msg: "Creating Sales Order..." }),
          basket.length > 0 && phase !== "submitting" && h("div", { className: "btn-row" },
            h("button", { className: "btn btn-gold btn-full", onClick: submit }, "Submit Sales Order"),
            h("button", { className: "btn btn-outline", onClick: () => { localStorage.removeItem(DRAFT_KEY); setPhase("history"); setBasket([]); setErr(""); } }, "Cancel"),
          ),
          basket.length === 0 && phase !== "submitting" && h("div", {
            style: { color: "var(--g2)", fontSize: 13, textAlign: "center", padding: "20px 0" } },
            "Search for items above to build your order.",
          ),
        );
      }

      function WeeklyOrdersView({ rep, onClose }) {
        const [orders, setOrders] = useState(null);
        const [err, setErr] = useState("");
        useEffect(() => {
          (async () => {
            try {
              const weekStart = (() => {
                const d = new Date(); d.setDate(d.getDate() - d.getDay() + 1); return d.toISOString().slice(0,10);
              })();
              const data = await Zoho.get("/salesorders", {
                date_start: weekStart,
                per_page: 200,
                sort_column: "date",
                sort_order: "D",
              });
              // Filter to this rep's orders by reference_number prefix
              const prefix = rep.rep_name.split(" ")[0].toUpperCase();
              const all = (data.salesorders || []).filter(so =>
                so.reference_number?.startsWith(`SO-${prefix}-`)
              );
              setOrders(all);
            } catch(e) { setErr(e.message); }
          })();
        }, []);

        return h("div", { className: "page" },
          h("div", { className: "card card-gold" },
            h("div", { className: "card-title" }, "This Week's Orders"),
            err && h("div", { className: "err-box" }, err),
            orders === null && !err && h(Spin, { msg: "Loading orders..." }),
            orders && orders.length === 0 && h("div", { style: { color: "var(--g1)", fontSize: 13, textAlign: "center", padding: "20px 0" } }, "No orders placed this week."),
            orders && orders.length > 0 && h("div", { style: { overflowX: "auto" } },
              h("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 12 } },
                h("thead", null, h("tr", null,
                  ["Date","Customer","SO #","Reference","Value","Status"].map(th =>
                    h("th", { key: th, style: { padding: "7px 8px", color: "var(--gold)", textAlign: "left", borderBottom: "1px solid var(--g3)", whiteSpace: "nowrap" } }, th)
                  )
                )),
                h("tbody", null, orders.map((so, i) =>
                  h("tr", { key: so.salesorder_id, style: { background: i % 2 === 0 ? "var(--black-2)" : "var(--black-3)" } },
                    h("td", { style: { padding: "7px 8px", color: "var(--white)" } }, fmt(so.date)),
                    h("td", { style: { padding: "7px 8px", color: "var(--white)", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, so.customer_name),
                    h("td", { style: { padding: "7px 8px", color: "var(--gold)" } }, so.salesorder_number),
                    h("td", { style: { padding: "7px 8px", color: "var(--g1)" } }, so.reference_number),
                    h("td", { style: { padding: "7px 8px", color: "var(--white)", textAlign: "right" } }, so.total ? `KES ${Number(so.total).toLocaleString()}` : "-"),
                    h("td", { style: { padding: "7px 8px" } }, h("span", { className: "chip" }, so.status || "draft")),
                  )
                )),
              ),
            ),
          ),
          h("div", { className: "btn-row" },
            h("button", { className: "btn btn-outline", onClick: onClose }, "Back"),
          ),
        );
      }

      // ─────────────────────────────────────────────────────────────
      //  RECIPIENTS EDITOR
      // ─────────────────────────────────────────────────────────────
      function RecipientsEditor({ onClose }) {
        const [list, setList] = useState(SORecipients.get());
        const [input, setInput] = useState("");
        const [saved, setSaved] = useState(false);
        function add() {
          const v = input.trim().toLowerCase();
          if (!v || !v.includes("@") || list.includes(v)) return;
          setList([...list, v]); setInput(""); setSaved(false);
        }
        function remove(e) { setList(list.filter(x => x !== e)); setSaved(false); }
        function save() { SORecipients.set(list); setSaved(true); }
        return h("div", { className: "page" },
          h("div", { className: "card card-gold" },
            h("div", { className: "card-title" }, "SO Email Recipients"),
            h("div", { style: { fontSize: 12, color: "var(--g1)", marginBottom: 12 } },
              "First address is TO. All others are CC."),
            list.map((e, i) => h("div", { key: e, style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 7 } },
              h("span", { className: "chip", style: { flex: 1 } }, i === 0 ? `TO: ${e}` : `CC: ${e}`),
              list.length > 1 && h("button", { className: "so-basket-remove", onClick: () => remove(e) }, "x"),
            )),
            h("div", { style: { display: "flex", gap: 8, marginTop: 10 } },
              h("input", { type: "text", placeholder: "Add email address...", value: input, onChange: e => setInput(e.target.value),
                onKeyDown: e => e.key === "Enter" && add(), style: { flex: 1 } }),
              h("button", { className: "btn btn-dark", onClick: add }, "Add"),
            ),
          ),
          saved && h("div", { className: "so-stamp", style: { marginBottom: 10 } }, "Recipients saved."),
          h("div", { className: "btn-row" },
            h("button", { className: "btn btn-gold", onClick: save }, "Save"),
            h("button", { className: "btn btn-outline", onClick: onClose }, "Back"),
          ),
        );
      }

      function App() {
        const [phase, setPhase] = useState("loading");
        const [err, setErr] = useState("");
        const [rep, setRep] = useState(null);
        const [cust, setCust] = useState(null);
        const [velMap, setVelMap] = useState({});
        const [mode, setMode] = useState("A");
        const [soDate, setSoDate] = useState(null);
        const [runRates, setRunRates] = useState({});
        const [overlay, setOverlay] = useState(""); // "" | "weekly" | "recipients"

        useEffect(() => {
          (async () => {
            try {
              const { token, orgId, refreshedAt, mailAccountId } = await Cache.loadAll();
              Zoho.init(token, orgId, refreshedAt, mailAccountId);
              setVelMap(Cache.velMap());
              setPhase("login");
            } catch (e) {
              setErr(e.message);
              setPhase("error");
            }
          })();
        }, []);

        async function selectCust(c) {
          setCust(c);
          setMode("A");
          setRunRates({});
          setPhase("loading");
          // Always fetch a fresh token before starting a visit — this guarantees
          // the token is never expired when the rep starts making Zoho calls
          try {
            const tr = await fetch(`./data/app/token.json?_=${Date.now()}`);
            if (tr.ok) {
              const td = await tr.json();
              if (td.access_token)
                Zoho.init(td.access_token, td.org_id, td.refreshed_at, td.mail_account_id);
            }
          } catch {}
          try {
            const so = await Zoho.lastSO(c.customer_id);
            setSoDate(so);
            VLog.set(c.customer_id, today());
          } catch {}
          setPhase("visit");
        }
        function visitDone() {
          setCust(null);
          setPhase("customers");
        }

        const title =
          phase === "visit" && cust
            ? cust.customer_name
            : phase === "customers" && rep
              ? `${rep.rep_name.split(" ")[0]}'s accounts`
              : CFG.COMPANY;

        // activeSKUs = SKUs the customer actually ordered, from the ReorderView fetch.
        // This is the correct set to exclude from pitch - not velMap keys (which are all 751).
        const activeSKUs = Object.keys(runRates);

        return h(
          "div",
          { id: "root" },
          h(InstallBanner, null),
          h(
            "div",
            { className: "tb" },
            h(LogoImg, { size: 30 }),
            h(
              "div",
              { className: "tb-center" },
              h("div", { className: "tb-title" }, title),
              rep &&
                phase !== "login" &&
                h("div", { className: "tb-sub" }, rep.rep_name),
            ),
            phase === "visit" &&
              h(
                "button",
                { className: "btn-ghost", onClick: visitDone },
                "Back",
              ),
            phase === "customers" &&
              h(
                "button",
                {
                  className: "btn-ghost",
                  onClick: () => {
                    setRep(null);
                    setPhase("login");
                  },
                },
                "Sign out",
              ),
          ),
          // Overlays
          overlay === "weekly" && rep && h(WeeklyOrdersView, { rep, onClose: () => setOverlay("") }),
          overlay === "recipients" && h(RecipientsEditor, { onClose: () => setOverlay("") }),
          overlay === "" && phase === "loading" && h(Spin, { msg: "Loading data..." }),
          phase === "error" &&
            h(
              "div",
              { className: "page" },
              h("div", { className: "err-box" }, err),
            ),
          phase === "login" &&
            h(LoginView, {
              onLogin: (r) => {
                setRep(r);
                setPhase("customers");
              },
            }),
          overlay === "" && phase === "customers" &&
            h("div", null,
              h("div", { className: "page", style: { paddingBottom: 0 } },
                h("div", { style: { display: "flex", gap: 8, marginBottom: 10 } },
                  h("button", { className: "btn btn-outline", style: { flex: 1, fontSize: 12 }, onClick: () => setOverlay("weekly") }, "This Week's Orders"),
                  h("button", { className: "btn btn-outline", style: { flex: 1, fontSize: 12 }, onClick: () => setOverlay("recipients") }, "Edit Recipients"),
                ),
              ),
              h(CustomerListView, { rep, velMap, onSelect: selectCust }),
            ),
          phase === "visit" &&
            cust &&
            h(
              "div",
              null,
              h(
                "div",
                { className: "page" },
                h(
                  "div",
                  { className: "mode-tabs no-print" },
                  h(
                    "button",
                    {
                      className: `mode-tab${mode === "A" ? " on" : ""}`,
                      onClick: () => setMode("A"),
                    },
                    "Reorder",
                  ),
                  h(
                    "button",
                    {
                      className: `mode-tab${mode === "B" ? " on" : ""}`,
                      onClick: () => setMode("B"),
                    },
                    "New Listings",
                  ),
                  h(
                    "button",
                    {
                      className: `mode-tab${mode === "C" ? " on" : ""}`,
                      onClick: () => setMode("C"),
                    },
                    "Sales Order",
                  ),
                ),
              ),
              mode === "A" &&
                h(ReorderView, {
                  rep,
                  customer: cust,
                  velMap,
                  soDate,
                  onDone: () => setMode("B"),
                  onRunRates: setRunRates,
                }),
              mode === "B" &&
                h(PitchView, {
                  rep,
                  customer: cust,
                  velMap,
                  activeSKUs,
                  onDone: visitDone,
                }),
              mode === "C" &&
                h(SalesOrderView, { rep, customer: cust, onDone: visitDone }),
            ),
        );
      }

      class ErrorBoundary extends React.Component {
        constructor(p) {
          super(p);
          this.state = { err: null };
        }
        static getDerivedStateFromError(e) {
          return { err: e };
        }
        render() {
          if (this.state.err) {
            return h(
              "div",
              { style: { padding: 24, fontFamily: "sans-serif" } },
              h(
                "div",
                {
                  style: {
                    background: "#2a0f0f",
                    color: "#e05252",
                    border: "1px solid #e05252",
                    borderRadius: 8,
                    padding: 16,
                    marginBottom: 12,
                  },
                },
                h(
                  "div",
                  { style: { fontWeight: 600, marginBottom: 6 } },
                  "Something went wrong",
                ),
                h(
                  "div",
                  { style: { fontSize: 12, opacity: 0.8 } },
                  String(this.state.err.message || this.state.err),
                ),
              ),
              h(
                "button",
                {
                  style: {
                    background: "#C9A84C",
                    color: "#000",
                    border: "none",
                    padding: "10px 20px",
                    borderRadius: 6,
                    cursor: "pointer",
                    fontWeight: 600,
                  },
                  onClick: () => this.setState({ err: null }),
                },
                "Try again",
              ),
            );
          }
          return this.props.children;
        }
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        h(ErrorBoundary, null, h(App)),
      );
    </script>
  </body>
  <!-- try -->
